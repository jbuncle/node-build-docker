name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate scripts
        run: |
          for f in bin/* local-dev.sh; do
            case "$(head -n 1 "$f")" in
              *node*) node --check "$f" ;;
              *bash*) bash -n "$f" ;;
              *) sh -n "$f" ;;
            esac
          done

      - name: Build Docker image
        run: docker build .
