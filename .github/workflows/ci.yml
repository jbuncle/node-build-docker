name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: find bin -type f -print0 | xargs -0 -n 1 sh -n && sh -n local-dev.sh

      - name: Build Docker image
        run: docker build .
